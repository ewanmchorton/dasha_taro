function getImgUrls(card){
  const w=WIKI[card.img],s=SACRED[card.img];
  return[w?`https://upload.wikimedia.org/wikipedia/commons/${w}`:null,s?`https://www.sacred-texts.com/tarot/pkt/img/${s}.jpg`:null].filter(Boolean);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ─── Stars ───
function StarsCanvas(){
  const ref=useRef(null);
  useEffect(()=>{const c=ref.current;if(!c)return;const ctx=c.getContext("2d");let id,stars=[];
    const resize=()=>{c.width=c.offsetWidth*2;c.height=c.offsetHeight*2;stars=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2+0.5,sp:Math.random()*0.3+0.05,ph:Math.random()*Math.PI*2}));};
    resize();window.addEventListener("resize",resize);
    const draw=t=>{ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const a=0.4+0.6*Math.sin(t*0.001*s.sp+s.ph);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(215,195,150,${a})`;ctx.fill();}id=requestAnimationFrame(draw);};
    id=requestAnimationFrame(draw);return()=>{cancelAnimationFrame(id);window.removeEventListener("resize",resize);};
  },[]);
  return React.createElement("canvas",{ref,style:{position:"fixed",inset:0,width:"100%",height:"100%",zIndex:0,pointerEvents:"none"}});
}

function CardImage({card}){
  const urls=getImgUrls(card);
  const[srcIdx,setSrcIdx]=useState(0);
  const[loaded,setLoaded]=useState(false);
  const[failed,setFailed]=useState(false);
  const handleError=()=>{if(srcIdx<urls.length-1)setSrcIdx(srcIdx+1);else setFailed(true);};
  const currentUrl=urls[srcIdx]||null;
  return(<>
    {currentUrl&&!failed&&<img src={currentUrl} alt={card.name} onLoad={()=>setLoaded(true)} onError={handleError} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:8,display:loaded?"block":"none"}}/>}
    {(!loaded||failed)&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#f5f0e1",color:"#1a1f4e",fontFamily:"'Cormorant Garamond',serif",fontSize:15,textAlign:"center",padding:12,lineHeight:1.4}}>{card.name}</div>}
  </>);
}

function TarotCard({card,flipped,onClick,label,delay=0,autoFlip=false}){
  const[appeared,setAppeared]=useState(false);
  const[isFlipped,setIsFlipped]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setAppeared(true),delay);return()=>clearTimeout(t);},[delay]);
  useEffect(()=>{if(autoFlip&&appeared){const t=setTimeout(()=>{setIsFlipped(true);if(onClick)onClick();},800);return()=>clearTimeout(t);}},[autoFlip,appeared]);
  useEffect(()=>{if(flipped)setIsFlipped(true);},[flipped]);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,opacity:appeared?1:0,transform:appeared?"translateY(0)":"translateY(30px)",transition:"opacity 0.6s ease,transform 0.6s ease"}}>
      {label&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,color:"#d4af37",letterSpacing:2,textTransform:"uppercase",marginBottom:4,textAlign:"center"}}>{label}</div>}
      <div onClick={!isFlipped&&!autoFlip?onClick:undefined} style={{width:140,height:245,perspective:800,cursor:isFlipped||autoFlip?"default":"pointer"}}>
        <div style={{width:"100%",height:"100%",position:"relative",transformStyle:"preserve-3d",transition:"transform 0.8s cubic-bezier(0.4,0,0.2,1)",transform:isFlipped?"rotateY(180deg)":"rotateY(0deg)"}}>
          <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",borderRadius:10,overflow:"hidden",boxShadow:isFlipped?"none":"0 0 25px rgba(212,175,55,0.15),0 8px 32px rgba(0,0,0,0.5)"}}><CardBack/></div>
          <div style={{position:"absolute",inset:0,backfaceVisibility:"hidden",transform:"rotateY(180deg)",borderRadius:10,overflow:"hidden",background:"#f5f0e1",boxShadow:"0 0 30px rgba(212,175,55,0.2),0 8px 32px rgba(0,0,0,0.5)"}}><CardImage card={card}/></div>
        </div>
      </div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,color:"#e8dcc8",textAlign:"center",minHeight:40,opacity:isFlipped?1:0,transform:isFlipped?"translateY(0)":"translateY(-10px)",transition:"opacity 0.5s ease 0.4s,transform 0.5s ease 0.4s",maxWidth:140,lineHeight:1.3}}>{isFlipped?card.name:""}</div>
    </div>
  );
}

// Journal — localStorage for standalone version
const JK="tarot-journal";
function loadJ(){try{return JSON.parse(localStorage.getItem(JK))||[];}catch{return[];}}
function saveJ(e){try{localStorage.setItem(JK,JSON.stringify(e));}catch(er){console.error(er);}}
function fmtDate(iso){const d=new Date(iso);const day=String(d.getDate()).padStart(2,"0");const m=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"][d.getMonth()];const h=String(d.getHours()).padStart(2,"0");const mn=String(d.getMinutes()).padStart(2,"0");return`${day} ${m}, ${h}:${mn}`;}

function App(){
  const[screen,setScreen]=useState("welcome");
  const[spread,setSpread]=useState(null);
  const[question,setQuestion]=useState("");
  const[drawnCards,setDrawnCards]=useState([]);
  const[flippedCards,setFlippedCards]=useState(new Set());
  const[showResult,setShowResult]=useState(false);
  const[fadeIn,setFadeIn]=useState(false);
  const[journal,setJournal]=useState(loadJ());
  const autoSavedRef=useRef(false);

  useEffect(()=>{setFadeIn(true);},[]);
  useEffect(()=>{if(screen){setFadeIn(false);const t=setTimeout(()=>setFadeIn(true),50);return()=>clearTimeout(t);}},[screen]);

  const selectSpread=s=>{setSpread(s);setQuestion("");setDrawnCards([]);setFlippedCards(new Set());setShowResult(false);autoSavedRef.current=false;setScreen("reading");};
  const startReading=()=>{const sh=shuffle(DECK);setDrawnCards(sh.slice(0,spread.count));setFlippedCards(new Set());setShowResult(false);autoSavedRef.current=false;};
  const flipCard=idx=>{if(flippedCards.has(idx))return;const next=new Set(flippedCards);next.add(idx);setFlippedCards(next);if(next.size===spread.count)setTimeout(()=>setShowResult(true),1200);};

  useEffect(()=>{if(spread?.autoFlip&&drawnCards.length>0&&!showResult){const t=setTimeout(()=>setShowResult(true),2200);return()=>clearTimeout(t);}},[spread,drawnCards,showResult]);

  useEffect(()=>{
    if(showResult&&!autoSavedRef.current&&drawnCards.length>0){
      autoSavedRef.current=true;
      const entry={id:Date.now(),date:new Date().toISOString(),spreadName:spread.name,question:question||null,cards:drawnCards.map(c=>({name:c.name,meaning:c.meaning}))};
      const u=[entry,...journal];setJournal(u);saveJ(u);
    }
  },[showResult]);

  const delEntry=id=>{const u=journal.filter(e=>e.id!==id);setJournal(u);saveJ(u);};
  const resetAll=()=>{setScreen("spread");setSpread(null);setDrawnCards([]);setFlippedCards(new Set());setShowResult(false);setQuestion("");autoSavedRef.current=false;};

  const btn={fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,padding:"12px 32px",background:"transparent",border:"1px solid #d4af37",color:"#d4af37",borderRadius:30,cursor:"pointer",letterSpacing:1.5,transition:"all 0.3s ease"};
  const bh=(e,on)=>{e.target.style.background=on?"rgba(212,175,55,0.12)":"transparent";e.target.style.boxShadow=on?"0 0 20px rgba(212,175,55,0.15)":"none";};
  const panel={background:"rgba(20,24,68,0.5)",border:"1px solid rgba(212,175,55,0.15)",borderRadius:16,backdropFilter:"blur(10px)"};
  const fade={opacity:fadeIn?1:0,transform:fadeIn?"translateY(0)":"translateY(20px)",transition:"opacity 0.8s ease,transform 0.8s ease"};

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 30%,#141844 0%,#0a0e2a 50%,#060818 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"30px 16px 60px",position:"relative",overflow:"hidden",fontFamily:"'Cormorant Garamond',serif"}}>
      <StarsCanvas/>
      <MoonDecor style={{position:"fixed",top:20,left:20}} size={50}/>
      <MoonDecor style={{position:"fixed",top:20,right:20,transform:"scaleX(-1)"}} size={50}/>
      <MoonDecor style={{position:"fixed",bottom:20,left:20,transform:"scaleY(-1)"}} size={40}/>
      <MoonDecor style={{position:"fixed",bottom:20,right:20,transform:"scale(-1)"}} size={40}/>

      {screen==="welcome"&&(
        <div style={{...fade,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,minHeight:"80vh",textAlign:"center",gap:20,zIndex:1}}>
          <div style={{width:180,height:180,borderRadius:"50%",background:"radial-gradient(circle,rgba(180,155,100,0.12) 0%,transparent 70%)",border:"1px solid rgba(212,175,55,0.15)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:10}}><span style={{fontSize:60,opacity:0.7}}>☽</span></div>
          <h1 style={{fontSize:36,fontWeight:300,color:"#e8dcc8",letterSpacing:4,margin:0}}>Расклад от Даши</h1>
          <p style={{fontSize:16,color:"#8a8199",fontStyle:"italic",margin:"0 0 20px",maxWidth:300,lineHeight:1.6}}>Расклад и послание карт</p>
          <button onClick={()=>setScreen("spread")} style={btn} onMouseEnter={e=>bh(e,true)} onMouseLeave={e=>bh(e,false)}>Начать расклад</button>
        </div>
      )}

      {screen==="spread"&&(
        <div style={{...fade,display:"flex",flexDirection:"column",alignItems:"center",flex:1,minHeight:"80vh",justifyContent:"center",gap:30,zIndex:1}}>
          <h2 style={{fontSize:26,fontWeight:300,color:"#e8dcc8",letterSpacing:3,margin:0}}>Выбери расклад</h2>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>
            {SPREADS.map(s=>(
              <div key={s.id} onClick={()=>selectSpread(s)} style={{width:180,padding:"28px 16px",...panel,cursor:"pointer",textAlign:"center",transition:"all 0.3s ease"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(212,175,55,0.5)";e.currentTarget.style.boxShadow="0 0 30px rgba(212,175,55,0.1)";e.currentTarget.style.transform="translateY(-4px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(212,175,55,0.15)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="translateY(0)";}}>
                <div style={{fontSize:24,marginBottom:12,letterSpacing:6}}>{s.icon}</div>
                <div style={{fontSize:18,fontWeight:600,color:"#e8dcc8",marginBottom:8}}>{s.name}</div>
                <div style={{fontSize:13,color:"#8a8199",fontStyle:"italic"}}>{s.description}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>setScreen("journal")} style={{...btn,fontSize:14,padding:"10px 24px",opacity:0.6,marginTop:8}}
            onMouseEnter={e=>{e.target.style.opacity="1";bh(e,true);}} onMouseLeave={e=>{e.target.style.opacity="0.6";bh(e,false);}}>✦ Мой журнал</button>
        </div>
      )}

      {screen==="reading"&&(
        <div style={{...fade,display:"flex",flexDirection:"column",alignItems:"center",flex:1,width:"100%",maxWidth:700,zIndex:1,gap:24,paddingTop:20}}>
          <h2 style={{fontSize:24,fontWeight:300,color:"#e8dcc8",letterSpacing:3,margin:0}}>{spread.name}</h2>
          {drawnCards.length===0&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,width:"100%",maxWidth:400}}>
              <p style={{fontSize:15,color:"#8a8199",fontStyle:"italic",textAlign:"center",margin:0,lineHeight:1.6}}>
                {spread.hasQuestion?`Сосредоточься на своём вопросе, вдохни и нажми «Вытянуть ${spread.count===1?"карту":"карты"}»`:"Сделай вдох, очисти мысли и вытяни свою карту дня"}
              </p>
              {spread.hasQuestion&&<textarea value={question} onChange={e=>setQuestion(e.target.value)} placeholder="Твой вопрос картам..."
                style={{width:"100%",minHeight:80,background:"rgba(20,24,68,0.4)",border:"1px solid rgba(212,175,55,0.2)",borderRadius:12,color:"#e8dcc8",fontFamily:"'Cormorant Garamond',serif",fontSize:16,padding:16,resize:"vertical",outline:"none",lineHeight:1.5}}
                onFocus={e=>e.target.style.borderColor="rgba(212,175,55,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(212,175,55,0.2)"}/>}
              <button onClick={startReading} style={btn} onMouseEnter={e=>bh(e,true)} onMouseLeave={e=>bh(e,false)}>✦ Вытянуть {spread.count===1?"карту":"карты"} ✦</button>
              <button onClick={()=>setScreen("spread")} style={{...btn,fontSize:13,padding:"8px 20px",opacity:0.5,marginTop:4}} onMouseEnter={e=>e.target.style.opacity="0.8"} onMouseLeave={e=>e.target.style.opacity="0.5"}>← Назад</button>
            </div>
          )}
          {drawnCards.length>0&&(<>
            <div style={{position:"relative",display:"flex",justifyContent:"center",alignItems:"center",padding:"40px 20px",width:"100%"}}>
              <div style={{position:"absolute",width:spread.count===1?220:480,height:spread.count===1?220:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(180,155,100,0.08) 0%,transparent 70%)",border:"1px solid rgba(212,175,55,0.08)",pointerEvents:"none"}}/>
              <svg style={{position:"absolute",width:spread.count===1?300:560,height:spread.count===1?300:400,pointerEvents:"none",opacity:0.15}} viewBox="0 0 560 400">
                {Array.from({length:16}).map((_,i)=>{const a=i*22.5*Math.PI/180,cx=280,cy=200;return <line key={i} x1={cx+Math.cos(a)*60} y1={cy+Math.sin(a)*60} x2={cx+Math.cos(a)*200} y2={cy+Math.sin(a)*200} stroke="#d4af37" strokeWidth="1" strokeDasharray="3 6"/>;})}
              </svg>
              <div style={{display:"flex",gap:spread.count===1?0:28,justifyContent:"center",alignItems:"flex-start",position:"relative",zIndex:2,flexWrap:"wrap"}}>
                {drawnCards.map((card,idx)=><TarotCard key={card.id} card={card} flipped={flippedCards.has(idx)} onClick={()=>flipCard(idx)} label={spread.labels[idx]} delay={idx*300} autoFlip={spread.autoFlip}/>)}
              </div>
            </div>
            {!showResult&&!spread.autoFlip&&flippedCards.size<spread.count&&<p style={{fontSize:14,color:"#8a8199",fontStyle:"italic",animation:"pulse 2s ease-in-out infinite"}}>Нажми на карту, чтобы перевернуть</p>}
            {showResult&&(
              <div style={{width:"100%",maxWidth:440,padding:28,...panel,textAlign:"center"}}>
                {question&&<p style={{fontSize:14,color:"#8a8199",fontStyle:"italic",marginTop:0,marginBottom:16}}>«{question}»</p>}
                <div style={{marginBottom:20}}>
                  {drawnCards.map((card,i)=>(
                    <div key={card.id} style={{marginBottom:i<drawnCards.length-1?14:0}}>
                      {spread.labels[i]&&<div style={{fontSize:11,color:"#d4af37",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{spread.labels[i]}</div>}
                      <div style={{fontSize:16,fontWeight:600,color:"#e8dcc8",marginBottom:4}}>{card.name}</div>
                      <div style={{fontSize:14,color:"#8a8199",fontStyle:"italic",lineHeight:1.5}}>{card.meaning}</div>
                    </div>
                  ))}
                </div>
                <div style={{width:40,height:1,background:"linear-gradient(90deg,transparent,#d4af37,transparent)",margin:"0 auto 20px"}}/>
                <p style={{fontSize:16,color:"#e8dcc8",lineHeight:1.7,margin:"0 0 20px"}}>
                  За персональной трактовкой и раскладами пиши{" "}
                  <a href="https://t.me/neva_nevajno" target="_blank" rel="noopener noreferrer" style={{color:"#d4af37",textDecoration:"none",borderBottom:"1px solid rgba(212,175,55,0.4)"}}>@neva_nevajno</a>
                </p>
                <a href="https://t.me/rasklad_takoj" target="_blank" rel="noopener noreferrer" style={{display:"inline-block",padding:"10px 24px",background:"rgba(212,175,55,0.1)",border:"1px solid rgba(212,175,55,0.3)",borderRadius:30,color:"#d4af37",textDecoration:"none",fontSize:14,letterSpacing:1}}>✦ Канал: Расклад Такой ✦</a>
                <p style={{fontSize:12,color:"#8a8199",marginTop:16,opacity:0.6}}>✓ Сохранено в журнал</p>
                <div style={{marginTop:16}}><button onClick={resetAll} style={{...btn,fontSize:14,padding:"10px 24px",opacity:0.7}} onMouseEnter={e=>{e.target.style.opacity="1";bh(e,true);}} onMouseLeave={e=>{e.target.style.opacity="0.7";bh(e,false);}}>Новый расклад</button></div>
              </div>
            )}
          </>)}
        </div>
      )}

      {screen==="journal"&&(
        <div style={{...fade,display:"flex",flexDirection:"column",alignItems:"center",flex:1,width:"100%",maxWidth:500,zIndex:1,gap:20,paddingTop:20}}>
          <h2 style={{fontSize:26,fontWeight:300,color:"#e8dcc8",letterSpacing:3,margin:0}}>Мой журнал</h2>
          <p style={{fontSize:14,color:"#8a8199",fontStyle:"italic",margin:0}}>История раскладов</p>
          {journal.length===0?<div style={{...panel,padding:"40px 28px",textAlign:"center",width:"100%",marginTop:20}}><p style={{fontSize:16,color:"#8a8199",margin:0}}>Пока пусто. Сделай свой первый расклад!</p></div>:(
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:12,marginTop:8}}>
              {journal.map(entry=>(
                <div key={entry.id} style={{...panel,padding:"20px 22px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div><div style={{fontSize:12,color:"#8a8199",marginBottom:4}}>{fmtDate(entry.date)}</div><div style={{fontSize:16,fontWeight:600,color:"#d4af37"}}>{entry.spreadName}</div></div>
                    <button onClick={()=>delEntry(entry.id)} style={{background:"none",border:"none",color:"#8a8199",cursor:"pointer",fontSize:16,padding:"2px 6px",opacity:0.4,transition:"opacity 0.2s"}} onMouseEnter={e=>e.target.style.opacity="1"} onMouseLeave={e=>e.target.style.opacity="0.4"}>✕</button>
                  </div>
                  {entry.question&&<p style={{fontSize:13,color:"#8a8199",fontStyle:"italic",margin:"0 0 8px"}}>«{entry.question}»</p>}
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {entry.cards.map((c,i)=><div key={i} style={{fontSize:13,color:"#e8dcc8",padding:"6px 12px",background:"rgba(212,175,55,0.06)",border:"1px solid rgba(212,175,55,0.12)",borderRadius:10}}><span style={{fontWeight:600}}>{c.name}</span>{c.meaning&&<span style={{color:"#8a8199"}}> — {c.meaning}</span>}</div>)}
                  </div>
                </div>
              ))}
            </div>
          )}
          <button onClick={()=>setScreen("spread")} style={{...btn,fontSize:14,padding:"10px 24px",opacity:0.6,marginTop:12}} onMouseEnter={e=>{e.target.style.opacity="1";bh(e,true);}} onMouseLeave={e=>{e.target.style.opacity="0.6";bh(e,false);}}>← Назад к раскладам</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
